<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* === GLOBAL SETTINGS === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fdfbf7; color: #333; overflow-x: hidden; }
        :root { --primary: #ff6b00; --secondary: #ff3c00; --whatsapp: #25D366; --dark: #121212; --border: #eaeaea; }

        /* === PREMIUM NAVBAR === */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px); position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .logo { font-size: 28px; font-weight: 800; color: var(--dark); letter-spacing: -1px; text-decoration: none; }
        .logo span { background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { display: flex; gap: 25px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.95rem; transition: 0.3s; padding: 5px 0; }
        .nav-links a:hover { color: var(--primary); }
        
        .cart-btn { position: relative; font-size: 1.1rem; text-decoration: none; color: var(--dark); display: flex; align-items: center; gap: 5px;}
        .cart-count { background: var(--secondary); color: white; font-size: 0.75rem; font-weight: 700; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: absolute; top: -10px; right: -15px; border: 2px solid white;}
        .menu-toggle { display: none; font-size: 28px; cursor: pointer; color: var(--dark); }

        /* === AUTH BACKGROUND WRAPPER === */
        .auth-wrapper {
            /* Beautiful Background Image with Dark Overlay */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 40px; /* Padding top prevents navbar overlap */
        }

        /* === LOGIN CARD (GLASSMORPHISM) === */
        .auth-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            width: 100%; 
            max-width: 420px; 
            padding: 40px 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            text-align: center;
        }

        .auth-header { margin-bottom: 30px; }
        .auth-header h2 { font-size: 2.2rem; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
        .auth-header h2 span { background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-header p { color: #555; font-size: 0.95rem; margin-top: 5px; }

        /* === INPUT STYLES === */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
        .input-field { 
            width: 100%; 
            padding: 12px 16px; 
            border-radius: 12px; 
            border: 1px solid #ccc; 
            background: white; 
            font-size: 0.95rem; 
            outline: none; 
            transition: 0.3s; 
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1); }

        /* === BUTTON === */
        .auth-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.05rem; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.25); 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 107, 0, 0.35); }

        .auth-footer { margin-top: 25px; font-size: 0.9rem; color: #555; font-weight: 500; }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
        .auth-footer a:hover { text-decoration: underline; }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .nav-links { 
                position: absolute; top: 100%; left: 0; width: 100%; 
                background: white; flex-direction: column; padding: 30px 20px; 
                box-shadow: 0 10px 20px rgba(0,0,0,0.1); gap: 20px; 
                display: none; align-items: flex-start;
            }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Home<span>Bite</span></a>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Chefs & Routines</a></li>
            <li><a href="live-menu.html">Live Food</a></li>
            <li>
                <a href="cart.html" class="cart-btn">
                    Cart 🛒<span class="cart-count" id="navCartCount">0</span>
                </a>
            </li>
            <li><a href="signup.html" class="btn btn-outline" style="border: 2px solid var(--primary); color: var(--primary); padding: 6px 20px; border-radius: 50px;">Sign Up</a></li>
        </ul>

        <div class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('active')">☰</div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome to Home<span>Bite</span></h2>
                <p>Please login to your student account.</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-field" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Create Account</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Set Cart Count on Load
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('homeBiteCart')) || [];
            let count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('navCartCount').innerText = count;
        }
        window.onload = updateCartCount;

        // SUPABASE CONNECTION
        const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Signing in...";
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(supabase) {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Login Failed: " + error.message);
                    btn.innerText = "Sign In";
                    btn.disabled = false;
                } else {
                    alert("Login Successful!");
                    window.location.href = 'index.html'; // Redirect to home page after success
                }
            } else {
                alert("Demo Login: Successful! (Connect Supabase to live test)");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
