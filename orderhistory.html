<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History & Tracking - HomeBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* === GLOBAL SETTINGS === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fdfbf7; color: #333; overflow-x: hidden; }
        :root { --primary: #ff6b00; --secondary: #ff3c00; --dark: #121212; --border: #eaeaea; --bg-light: #fff5eb; }

        /* === PREMIUM NAVBAR === */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px); position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .logo { font-size: 28px; font-weight: 800; color: var(--dark); letter-spacing: -1px; text-decoration: none; }
        .logo span { background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { display: flex; gap: 25px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.95rem; transition: 0.3s; padding: 5px 0; }
        .nav-links a:hover { color: var(--primary); }
        .back-btn { display: flex; align-items: center; gap: 8px; color: #555; font-weight: 600; text-decoration: none; margin-bottom: 20px; transition: 0.2s;}
        .back-btn:hover { color: var(--primary); transform: translateX(-5px); }

        /* === PAGE CONTAINER === */
        .page-container { max-width: 900px; margin: 120px auto 50px; padding: 0 5%; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .page-header h1 { font-size: 2.2rem; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
        .filter-select { padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border); outline: none; font-weight: 600; color: #555; background: white; cursor: pointer; }

        /* === ORDER CARD DESIGN === */
        .order-card { 
            background: white; border-radius: 20px; padding: 30px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid var(--border);
            transition: 0.3s;
        }
        .order-card:hover { box-shadow: 0 15px 35px rgba(255, 107, 0, 0.08); border-color: rgba(255, 107, 0, 0.2); }

        /* Header of Card */
        .card-header { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .order-id { font-size: 1.1rem; font-weight: 800; color: var(--dark); }
        .order-date { font-size: 0.85rem; color: #777; font-weight: 500; margin-top: 4px; }
        .order-amount { font-size: 1.2rem; font-weight: 800; color: var(--primary); text-align: right; }
        .item-count { font-size: 0.85rem; color: #777; font-weight: 500; }
        .kitchen-name { font-size: 0.85rem; color: var(--primary); font-weight: 600; margin-top: 4px; }

        /* Order Items */
        .order-items { margin-bottom: 25px; }
        .item-row { display: flex; justify-content: space-between; font-size: 0.95rem; color: #444; font-weight: 500; margin-bottom: 8px; }
        
        /* === TRACKING TIMELINE === */
        .tracking-container { background: var(--bg-light); padding: 25px; border-radius: 16px; margin-bottom: 25px; }
        .timeline { display: flex; justify-content: space-between; position: relative; }
        
        /* Line connecting steps */
        .timeline::before { content: ''; position: absolute; top: 16px; left: 5%; width: 90%; height: 4px; background: #e0e0e0; z-index: 1; border-radius: 10px; }
        .timeline-progress { position: absolute; top: 16px; left: 5%; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); z-index: 2; border-radius: 10px; transition: 0.5s; }
        
        .step { position: relative; z-index: 3; text-align: center; width: 25%; }
        .step-icon { 
            width: 36px; height: 36px; background: white; border-radius: 50%; margin: 0 auto 10px; 
            display: flex; align-items: center; justify-content: center; color: #ccc; font-weight: bold; font-size: 1rem;
            border: 4px solid #e0e0e0; transition: 0.3s;
        }
        .step-label { font-size: 0.8rem; font-weight: 700; color: #999; }
        
        /* Active Step Styles */
        .step.active .step-icon { background: var(--primary); color: white; border-color: #fff; box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.3); }
        .step.active .step-label { color: var(--dark); }

        /* === ACTION BUTTONS === */
        .card-actions { display: flex; gap: 15px; justify-content: flex-end; }
        .btn { padding: 10px 24px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.3s; border: none; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: #555; }
        .btn-outline:hover { border-color: var(--dark); color: var(--dark); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--secondary); box-shadow: 0 5px 15px rgba(255, 107, 0, 0.3); }

        /* === RESPONSIVE === */
        @media (max-width: 600px) {
            .page-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .timeline { flex-direction: column; gap: 20px; align-items: flex-start; padding-left: 10px;}
            .timeline::before { top: 0; left: 26px; width: 4px; height: 100%; }
            .timeline-progress { top: 0; left: 26px; width: 4px; height: 0%; /* JS will handle height */ }
            .step { width: 100%; display: flex; align-items: center; gap: 15px; text-align: left; }
            .step-icon { margin: 0; }
            .card-actions { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Home<span>Bite</span></a>
        <ul class="nav-links">
            <li><a href="profile.html">My Profile</a></li>
            <li><a href="cart.html">Cart 🛒</a></li>
        </ul>
    </nav>

    <div class="page-container">
        
        <a href="profile.html" class="back-btn">← Back to Profile</a>

        <div class="page-header">
            <h1>📦 My Orders</h1>
            <select class="filter-select" id="orderFilter" onchange="filterOrders()">
                <option value="all">All Orders</option>
                <option value="active">Active Tracking</option>
                <option value="delivered">Delivered</option>
            </select>
        </div>

        <div id="loadingMessage" style="text-align: center; color: var(--primary); font-weight: bold; font-size: 1.2rem; margin-top: 50px;">
            Loading your delicious history... 🍕
        </div>

        <div id="ordersContainer" style="display: none;">
            </div>

    </div>

    <script>
        // Global array to store fetched orders
        let fetchedOrders = [];

        // 1. Fetch Orders from Backend
        async function fetchOrders() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                alert("Please login to view your orders.");
                window.location.href = "login.html";
                return;
            }

            const user = JSON.parse(userStr);
            const userId = user.id;

            try {
                const response = await fetch(`http://localhost:5000/api/orders/${userId}`);
                const data = await response.json();

                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('ordersContainer').style.display = 'block';

                if (data.success) {
                    fetchedOrders = data.orders;
                    renderOrders(fetchedOrders);
                } else {
                    document.getElementById('ordersContainer').innerHTML = `<p style="text-align:center; color:red;">Error: ${data.message}</p>`;
                }
            } catch (error) {
                console.error("Error fetching orders:", error);
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('ordersContainer').innerHTML = '<p style="text-align:center; color:red;">Failed to connect to the server.</p>';
            }
        }

        // 2. Render Orders to HTML
        function renderOrders(ordersToRender) {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = '';

            if (ordersToRender.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#777; font-size: 1.1rem; padding: 40px;">No orders found here yet! 🍽️</p>';
                return;
            }

            ordersToRender.forEach(order => {
                // Determine Status Level (1 to 4)
                let statusLevel = 1; 
                const dbStatus = order.status.toLowerCase();
                
                if (dbStatus.includes('prepar') || dbStatus.includes('accept')) statusLevel = 2;
                if (dbStatus.includes('way') || dbStatus.includes('dispatch') || dbStatus.includes('out')) statusLevel = 3;
                if (dbStatus.includes('deliver')) statusLevel = 4;

                const isDelivered = statusLevel === 4;

                // Calculate Timeline Progress Bar Width (Desktop vs Mobile)
                let progressWidth = '0%';
                if(statusLevel === 2) progressWidth = '33%';
                if(statusLevel === 3) progressWidth = '66%';
                if(statusLevel === 4) progressWidth = '100%';

                // Map Order Items
                let itemsHTML = '';
                let totalItemsCount = 0;

                order.order_items.forEach(item => {
                    const itemName = item.food_items ? item.food_items.name : "Unknown Item";
                    const itemTotalPrice = item.price * item.quantity;
                    totalItemsCount += item.quantity;
                    itemsHTML += `<div class="item-row"><span>${item.quantity}x ${itemName}</span><span>₹${itemTotalPrice}</span></div>`;
                });

                // Format Date
                const dateObj = new Date(order.created_at);
                const formattedDate = dateObj.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

                // Shorten UUID for Display
                const shortId = "HB-" + order.id.substring(0, 6).toUpperCase();

                // Kitchen Details
                const kitchenName = order.cooks && order.cooks.kitchen_name ? order.cooks.kitchen_name : "HomeBite Chef";
                const cookPhone = order.cooks && order.cooks.phone ? order.cooks.phone : "";

                // Generate Card
                const cardHTML = `
                    <div class="order-card">
                        <div class="card-header">
                            <div>
                                <div class="order-id">#${shortId}</div>
                                <div class="kitchen-name">👨‍🍳 ${kitchenName}</div>
                                <div class="order-date">${formattedDate}</div>
                            </div>
                            <div>
                                <div class="order-amount">₹${order.total_amount}</div>
                                <div class="item-count">${totalItemsCount} ${totalItemsCount > 1 ? 'Items' : 'Item'}</div>
                            </div>
                        </div>

                        <div class="order-items">
                            ${itemsHTML}
                        </div>

                        <div class="tracking-container">
                            <div class="timeline">
                                <div class="timeline-progress" style="width: ${window.innerWidth > 600 ? progressWidth : '4px'}; height: ${window.innerWidth <= 600 ? progressWidth : '4px'};"></div>
                                
                                <div class="step ${statusLevel >= 1 ? 'active' : ''}">
                                    <div class="step-icon">📝</div>
                                    <div class="step-label">Order Placed</div>
                                </div>
                                <div class="step ${statusLevel >= 2 ? 'active' : ''}">
                                    <div class="step-icon">👨‍🍳</div>
                                    <div class="step-label">Preparing</div>
                                </div>
                                <div class="step ${statusLevel >= 3 ? 'active' : ''}">
                                    <div class="step-icon">🛵</div>
                                    <div class="step-label">On the Way</div>
                                </div>
                                <div class="step ${statusLevel >= 4 ? 'active' : ''}">
                                    <div class="step-icon">✅</div>
                                    <div class="step-label">Delivered</div>
                                </div>
                            </div>
                        </div>

                        <div class="card-actions">
                            <button class="btn btn-outline" onclick="alert('Connecting to help center for Order #${shortId}')">Need Help?</button>
                            ${isDelivered 
                                ? `<button class="btn btn-primary" onclick="alert('This feature will be available soon!')">↻ Reorder</button>` 
                                : `<button class="btn btn-primary" style="background: #25D366;" onclick="window.location.href='tel:${cookPhone}'">📞 Call Kitchen</button>`
                            }
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // 3. Filter Logic
        function filterOrders() {
            const filterValue = document.getElementById('orderFilter').value;
            let filtered = [];

            if (filterValue === 'all') {
                filtered = fetchedOrders;
            } else if (filterValue === 'active') {
                // Filter orders that are not delivered yet
                filtered = fetchedOrders.filter(o => !o.status.toLowerCase().includes('deliver'));
            } else if (filterValue === 'delivered') {
                // Filter delivered orders
                filtered = fetchedOrders.filter(o => o.status.toLowerCase().includes('deliver'));
            }

            renderOrders(filtered);
        }

        // Handle Responsive Timeline Progress on window resize
        window.addEventListener('resize', () => filterOrders()); // Re-render based on current filter to adjust timeline heights
        
        // Fetch when page loads
        window.onload = fetchOrders;

    </script>
</body>
</html>
