<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - HomeBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* === GLOBAL SETTINGS === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fdfbf7; color: #333; overflow-x: hidden; }
        :root { --primary: #ff6b00; --secondary: #ff3c00; --whatsapp: #25D366; --dark: #121212; --border: #eaeaea; }

        /* === PREMIUM NAVBAR === */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px); position: fixed; width: 100%; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .logo { font-size: 28px; font-weight: 800; color: var(--dark); letter-spacing: -1px; text-decoration: none; }
        .logo span { background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { display: flex; gap: 25px; list-style: none; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.95rem; transition: 0.3s; padding: 5px 0; }
        .nav-links a:hover { color: var(--primary); }
        
        .cart-btn { position: relative; font-size: 1.1rem; text-decoration: none; color: var(--dark); display: flex; align-items: center; gap: 5px;}
        .cart-count { background: var(--secondary); color: white; font-size: 0.75rem; font-weight: 700; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: absolute; top: -10px; right: -15px; border: 2px solid white;}
        .menu-toggle { display: none; font-size: 28px; cursor: pointer; color: var(--dark); }

        /* === PROFILE CONTAINER === */
        .profile-container { max-width: 1100px; margin: 120px auto 50px; padding: 0 5%; }
        
        /* === PREMIUM PROFILE HERO BANNER === */
        .profile-banner { 
            background: linear-gradient(135deg, #ffffff 0%, #fffbf7 100%); 
            padding: 40px; 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            gap: 35px; 
            margin-bottom: 35px; 
            box-shadow: 0 15px 35px rgba(255, 107, 0, 0.04); 
            border: 1px solid rgba(255, 107, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .profile-banner::before {
            content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px;
            background: radial-gradient(var(--light-bg), transparent 70%); opacity: 0.4; border-radius: 50%;
        }
        .profile-img { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2.4rem; 
            color: white; 
            font-weight: 800; 
            box-shadow: 0 8px 25px rgba(255, 60, 0, 0.25);
            border: 4px solid white;
        }
        .profile-info h1 { font-size: 2.2rem; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; margin-bottom: 5px; }
        .profile-info .email-phone { color: #555; font-size: 1rem; font-weight: 500; display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .profile-info .address-badge { 
            background: #fff5eb; color: var(--secondary); font-size: 0.9rem; font-weight: 600; 
            padding: 6px 16px; border-radius: 50px; display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid rgba(255, 107, 0, 0.15);
        }

        /* === DASHBOARD LAYOUT === */
        .content-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 35px; }
        .card { background: white; padding: 30px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .section-title { font-size: 1.3rem; font-weight: 800; color: var(--dark); margin-bottom: 25px; border-bottom: 2px solid #f9f9f9; padding-bottom: 12px; display: flex; align-items: center; gap: 10px; }

        /* === SETTINGS MENU === */
        .settings-list { list-style: none; }
        .settings-item { 
            padding: 14px 18px; border-radius: 14px; color: #444; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
        }
        .settings-item:hover { background: #fff5eb; color: var(--primary); transform: translateX(5px); }
        .settings-item span.arrow { font-size: 1.1rem; opacity: 0.7; }

        /* === PREMIUM ORDER HISTORY === */
        .order-card { padding: 20px 0; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .order-card:last-child { border-bottom: none; }
        .order-details h4 { font-size: 1.1rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
        .order-details p { color: #777; font-size: 0.85rem; font-weight: 500; }
        
        .order-status-wrapper { text-align: right; }
        .order-status { font-size: 0.8rem; font-weight: 700; padding: 6px 14px; border-radius: 50px; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-completed { background: #e8f9f0; color: #00d26a; }
        .status-pending { background: #fff3e0; color: var(--primary); }

        /* === LOGOUT BUTTON === */
        .logout-btn { background: #fff1f0; color: #d93025; padding: 14px; border-radius: 14px; border: 1px solid rgba(217, 48, 37, 0.1); font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logout-btn:hover { background: #d93025; color: white; box-shadow: 0 8px 20px rgba(217, 48, 37, 0.2); }

        /* === RESPONSIVE DESIGN === */
        @media (max-width: 900px) {
            .nav-links { 
                position: absolute; top: 100%; left: 0; width: 100%; 
                background: white; flex-direction: column; padding: 30px 20px; 
                box-shadow: 0 10px 20px rgba(0,0,0,0.1); gap: 20px; 
                display: none; align-items: flex-start;
            }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
            .content-grid { grid-template-columns: 1fr; gap: 25px; }
            .profile-banner { flex-direction: column; text-align: center; padding: 30px 20px; gap: 15px; }
            .profile-info .email-phone { justify-content: center; gap: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">Home<span>Bite</span></a>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Chefs & Routines</a></li>
            <li><a href="live-menu.html">Live Food</a></li>
            <li>
                <a href="cart.html" class="cart-btn">
                    Cart 🛒<span class="cart-count" id="navCartCount">0</span>
                </a>
            </li>
            <li><a href="#" onclick="handleLogout()" class="btn btn-outline" style="border: 2px solid #d93025; color: #d93025; padding: 6px 20px; border-radius: 50px; text-decoration: none; font-weight:600;">Logout</a></li>
        </ul>

        <div class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('active')">☰</div>
    </nav>

    <div class="profile-container">
        <div class="profile-banner">
            <div class="profile-img" id="userInitials">--</div>
            <div class="profile-info">
                <h1 id="userFullName">Loading Profile...</h1>
                <div class="email-phone">
                    <span id="userEmail">📧 --</span>
                    <span>•</span>
                    <span id="userPhone">📞 --</span>
                </div>
                <div class="address-badge">
                    📍 <span id="userAddress">--</span>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <h2 class="section-title">⚙️ Account Operations</h2>
                <ul class="settings-list">
                    <li class="settings-item">Edit Profile Details <span class="arrow">➔</span></li>
                    <li class="settings-item">Change Secret Password <span class="arrow">➔</span></li>
                    <li class="settings-item">Manage Delivery Addresses <span class="arrow">➔</span></li>
                    <li class="settings-item">Help & Active Support <span class="arrow">➔</span></li>
                </ul>
                <button class="logout-btn" onclick="handleLogout()">🚪 Secure Logout</button>
            </div>

            <div class="card">
                <h2 class="section-title">📦 Your Order History</h2>
                <div id="orderList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Set Cart Count on Page Load
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('homeBiteCart')) || [];
            let count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('navCartCount').innerText = count;
        }

        // Run checking on page load
        window.onload = function() {
            updateCartCount();
            
            // LocalStorage se logged-in user uthao
            const loggedInUser = JSON.parse(localStorage.getItem('homeBiteUser'));

            // Agar user login nahi hai, use login page par redirect kar do
            if (!loggedInUser) {
                alert("Please log in first to view your personal dashboard.");
                window.location.href = 'login.html';
                return;
            }

            // Real dynamic data render karo frontend dashboard pe
            const fullName = loggedInUser.user_metadata?.full_name || "HomeBite User";
            const email = loggedInUser.email || "No email added";
            const phone = loggedInUser.user_metadata?.phone_number || "No number";
            const address = loggedInUser.user_metadata?.hostel_address || "No address added";

            document.getElementById('userFullName').innerText = fullName;
            document.getElementById('userEmail').innerText = "📧 " + email;
            document.getElementById('userPhone').innerText = "📞 " + phone;
            document.getElementById('userAddress').innerText = address;

            // Generate beautifully customized initials (e.g., "Rupesh Kumar" -> "RK")
            const initials = fullName.split(' ').map(name => name[0]).join('').toUpperCase().substring(0,2);
            document.getElementById('userInitials').innerText = initials;

            // Render dynamic order history simulation
            renderMockOrders();
        };

        function renderMockOrders() {
            const mockOrders = [
                { id: "#HB-9841", item: "Special Premium Rajma Chawal Combo", date: "Today, 1:15 PM", status: "Pending" },
                { id: "#HB-9720", item: "Chicken Dum Biryani (Hostel Feast Pack)", date: "Yesterday", status: "Completed" },
                { id: "#HB-9511", item: "Ghar Jaisa Paneer Butter Masala + 4 Roti", date: "02 June 2026", status: "Completed" }
            ];

            const list = document.getElementById('orderList');
            list.innerHTML = '';
            mockOrders.forEach(order => {
                list.innerHTML += `
                    <div class="order-card">
                        <div class="order-details">
                            <h4>${order.item}</h4>
                            <p>${order.id} • ${order.date}</p>
                        </div>
                        <div class="order-status-wrapper">
                            <span class="order-status ${order.status === 'Completed' ? 'status-completed' : 'status-pending'}">
                                ${order.status}
                            </span>
                        </div>
                    </div>
                `;
            });
        }

        // Secure Logout Operation
        function handleLogout() {
            localStorage.removeItem('homeBiteUser');
            localStorage.removeItem('homeBiteToken');
            alert("Logged out successfully! Have a good day.");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
