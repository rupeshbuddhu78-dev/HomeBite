<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Profile & Menu - HomeBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* === GLOBAL SETTINGS === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fdfbf7; color: #333; scroll-behavior: smooth; }
        :root { --primary: #ff6b00; --secondary: #ff3c00; --whatsapp: #25D366; --dark: #121212; --light-bg: #fff5eb; --border: #eaeaea; }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; color: var(--dark); text-decoration: none; }
        .logo span { color: var(--primary); }
        .back-btn { text-decoration: none; color: #555; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: var(--primary); }

        /* Container & Header */
        .profile-container { max-width: 1200px; margin: 30px auto; padding: 0 5%; }
        .profile-header { background: white; padding: 25px 30px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 30px; border: 1px solid var(--border); }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-left img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #ffe6d5; }
        .header-info h1 { font-size: 2rem; color: var(--dark); margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; background: #e8f9f0; color: #00d26a; }
        .status-offline { background: #f0f0f0; color: #777; }
        
        .btn-wa { background: var(--whatsapp); color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none; font-weight: 600; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2); transition: 0.3s; }
        .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); }

        /* === TWO COLUMN LAYOUT === */
        .layout-grid { display: flex; gap: 30px; flex-wrap: wrap; align-items: flex-start; }
        .col-left, .col-right { flex: 1; min-width: 320px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid var(--border); }

        /* Section Titles */
        .section-title { font-size: 1.5rem; color: var(--dark); font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .badge-price { background: var(--light-bg); color: var(--primary); padding: 5px 12px; border-radius: 12px; font-size: 0.9rem; }

        /* === LEFT COL: ROUTINE STYLES === */
        .day-card { border: 1px solid var(--border); border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .day-header { background: #fafafa; padding: 12px 20px; font-weight: 700; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid var(--border); }
        .meal-list { list-style: none; padding: 15px 20px; }
        
        .meal-list li { display: flex; align-items: flex-start; margin-bottom: 12px; font-size: 0.95rem; }
        .meal-list li:last-child { margin-bottom: 0; }
        .meal-time { font-weight: 600; min-width: 125px; flex-shrink: 0; color: #555; }
        .meal-food { color: var(--dark); font-weight: 500; flex: 1; line-height: 1.4; }

        /* === RIGHT COL: LIVE MENU STYLES === */
        .live-item { display: flex; gap: 15px; align-items: center; padding: 15px 0; border-bottom: 1px dashed var(--border); }
        .live-item:last-child { border-bottom: none; }
        .live-item img { width: 90px; height: 90px; border-radius: 15px; object-fit: cover; }
        .item-info { flex: 1; }
        .item-info h4 { font-size: 1.1rem; color: var(--dark); margin-bottom: 4px; }
        .item-info p { font-size: 0.85rem; color: #777; margin-bottom: 8px; line-height: 1.3; }
        .item-info .price { font-size: 1.1rem; font-weight: 700; color: var(--dark); }
        
        .add-btn { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 8px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        .add-btn:hover { background: var(--primary); color: white; }

        /* Offline/Loading Message */
        .offline-msg, .loading-msg { text-align: center; padding: 40px 20px; color: #888; width: 100%; }
        .loading-msg { font-size: 1.2rem; font-weight: 500; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .profile-header { justify-content: center; text-align: center; }
            .header-left { flex-direction: column; }
            .btn-wa { width: 100%; text-align: center; }
            .layout-grid { flex-direction: column; } 
            .col-left, .col-right { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="menu.html" class="back-btn">⬅ Back</a>
        <a href="index.html" class="logo">Home<span>Bite</span></a>
    </nav>

    <div class="profile-container">
        <div id="mainLoading" class="loading-msg">⏳ Connecting to Kitchen, please wait...</div>

        <div id="contentWrapper" style="display: none;">
            <div class="profile-header" id="profileHeader"></div>

            <div class="layout-grid">
                
                <div class="col-left">
                    <h2 class="section-title">
                        📅 Weekly Routine
                        <span class="badge-price">₹4,000 / month</span>
                    </h2>
                    <div id="routineContainer"></div>
                    <a id="subscribeBtn" href="#" target="_blank" class="btn-wa" style="width: 100%; text-align: center; margin-top: 20px; background: var(--primary); box-shadow: none;">Subscribe to Monthly Plan</a>
                </div>

                <div class="col-right">
                    <h2 class="section-title">
                        🔥 Order Live Now
                        <span class="badge-price">Instant Delivery</span>
                    </h2>
                    <div id="liveMenuContainer"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 🔴 UPDATE THIS: Apna live Render server URL yahan dalein
        const API_BASE_URL = "https://your-backend-url.onrender.com"; 

        // 1. Get ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const chefId = urlParams.get('id'); 

        async function loadChefProfile() {
            if (!chefId) {
                document.getElementById('mainLoading').innerHTML = "❌ No Chef ID provided in the link!";
                return;
            }

            try {
                // Parallel API Requests: Chef aur uski Routine ko live database se fetch karein
                const [chefRes, routineRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/api/cooks`),
                    fetch(`${API_BASE_URL}/api/cook/routine/${chefId}`)
                ]);

                const chefData = await chefRes.json();
                const routineData = await routineRes.json();

                if (!chefData.success) {
                    throw new Error("Failed to load cooks list");
                }

                // Pure list mein se select kiya gaya chef dhoondhein
                const chef = chefData.kitchens.find(c => c.id == chefId);

                if (!chef) {
                    document.getElementById('mainLoading').innerHTML = "❌ Chef not found in database!";
                    return;
                }

                // Hide loading screen, show main content
                document.getElementById('mainLoading').style.display = 'none';
                document.getElementById('contentWrapper').style.display = 'block';

                // 2. Render Header Information
                const isOnline = chef.is_open === true || chef.is_open === 'true';
                const chefImg = chef.profile_pic_url || "https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=150&q=80";
                const kitchenName = chef.kitchen_name || `${chef.name}'s Kitchen`;
                const whatsappNumber = chef.phone_number || "911234567890"; // Fallback phone

                document.getElementById('profileHeader').innerHTML = `
                    <div class="header-left">
                        <img src="${chefImg}" alt="${chef.name}">
                        <div class="header-info">
                            <h1>${chef.name}</h1>
                            <p style="color: #666; font-size: 0.95rem; margin-bottom: 5px;">📍 ${kitchenName}</p>
                            <div class="status-badge ${!isOnline ? 'status-offline' : ''}">
                                ${isOnline ? '🟢 Cooking Live Now' : '🔴 Currently Offline'}
                            </div>
                        </div>
                    </div>
                    <a href="https://wa.me/${whatsappNumber}?text=Hi ${chef.name}, I want to join your ${kitchenName} group!" target="_blank" class="btn-wa">💬 Join WhatsApp Group</a>
                `;

                // Update Subscribe button dynamically
                document.getElementById('subscribeBtn').href = `https://wa.me/${whatsappNumber}?text=Hi ${chef.name}, I want to buy your monthly subscription for ${kitchenName}`;

                // 3. Render Weekly Routine
                const routineBox = document.getElementById('routineContainer');
                const routines = routineData.routines || [];

                if (routines.length === 0) {
                    routineBox.innerHTML = `<p style="color:#888; text-align:center; padding: 20px;">No weekly routine updated yet by the chef.</p>`;
                } else {
                    // Days sorting array taaki Mon-Sun order sahi rahe
                    const daysOrder = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
                    routines.sort((a, b) => daysOrder.indexOf(a.day_of_week) - daysOrder.indexOf(b.day_of_week));

                    routines.forEach(dayData => {
                        routineBox.innerHTML += `
                            <div class="day-card">
                                <div class="day-header">${dayData.day_of_week} <span style="font-size:0.8rem; font-weight:normal; color:#888;">(${dayData.plan_type || 'Regular'})</span></div>
                                <ul class="meal-list">
                                    <li><span class="meal-time">🌅 Morning:</span> <span class="meal-food">${dayData.morning_meal || 'Not available'}</span></li>
                                    <li><span class="meal-time">☀️ Afternoon:</span> <span class="meal-food">${dayData.afternoon_meal || 'Not available'}</span></li>
                                    <li><span class="meal-time">🌙 Night:</span> <span class="meal-food">${dayData.night_meal || 'Not available'}</span></li>
                                </ul>
                            </div>
                        `;
                    });
                }

                // 4. Render Live Menu
                const liveBox = document.getElementById('liveMenuContainer');
                
                // Agar chef online hai aur uske paas liveItems hain (Note: Agar alag items endpoint hai toh aap use use kar sakte hain)
                if (isOnline && chef.liveItems && chef.liveItems.length > 0) {
                    chef.liveItems.forEach(item => {
                        liveBox.innerHTML += `
                            <div class="live-item">
                                <img src="${item.img || 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=150&q=80'}" alt="${item.name}">
                                <div class="item-info">
                                    <h4>${item.name}</h4>
                                    <p>${item.desc || 'Freshly cooked home meal.'}</p>
                                    <span class="price">${item.price}</span>
                                </div>
                                <a href="https://wa.me/${whatsappNumber}?text=I want to order live item: ${item.name} (${item.price})" target="_blank" class="add-btn">Add +</a>
                            </div>
                        `;
                    });
                } else {
                    // Show Offline Message
                    liveBox.innerHTML = `
                        <div class="offline-msg">
                            <h2 style="font-size: 3rem; margin-bottom: 10px;">😴</h2>
                            <h3>Chef is resting right now</h3>
                            <p style="margin-top: 10px;">Live ordering is closed. However, you can still check the weekly routine and subscribe to the monthly plan on the left.</p>
                        </div>
                    `;
                }

            } catch (error) {
                console.error("Error loading profile:", error);
                document.getElementById('mainLoading').innerHTML = `❌ Error: Connection failed! Make sure your backend server is active.`;
            }
        }

        // Initialize on page load
        window.onload = loadChefProfile;
    </script>
</body>
</html>
