    <style>
        /* === GLOBAL SETTINGS === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fdfbf7; color: #333; scroll-behavior: smooth; }
        :root { --primary: #ff6b00; --secondary: #ff3c00; --whatsapp: #25D366; --dark: #121212; --light-bg: #fff5eb; --border: #eaeaea; }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 800; color: var(--dark); text-decoration: none; }
        .logo span { color: var(--primary); }
        .back-btn { text-decoration: none; color: #555; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: var(--primary); }

        /* Container & Header */
        .profile-container { max-width: 1200px; margin: 30px auto; padding: 0 5%; }
        .profile-header { background: white; padding: 25px 30px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 30px; border: 1px solid var(--border); }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-left img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #ffe6d5; }
        .header-info h1 { font-size: 2rem; color: var(--dark); margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; background: #e8f9f0; color: #00d26a; }
        .status-offline { background: #f0f0f0; color: #777; }
        
        .btn-wa { background: var(--whatsapp); color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none; font-weight: 600; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2); transition: 0.3s; }
        .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); }

        /* === TWO COLUMN LAYOUT === */
        .layout-grid { display: flex; gap: 30px; flex-wrap: wrap; align-items: flex-start; }
        .col-left, .col-right { flex: 1; min-width: 320px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid var(--border); }

        /* Section Titles */
        .section-title { font-size: 1.5rem; color: var(--dark); font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .badge-price { background: var(--light-bg); color: var(--primary); padding: 5px 12px; border-radius: 12px; font-size: 0.9rem; }

        /* === LEFT COL: ROUTINE STYLES (FIXED ALIGNMENT) === */
        .day-card { border: 1px solid var(--border); border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .day-header { background: #fafafa; padding: 12px 20px; font-weight: 700; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid var(--border); }
        .meal-list { list-style: none; padding: 15px 20px; }
        
        /* Fixed layout for meal items */
        .meal-list li { display: flex; align-items: flex-start; margin-bottom: 12px; font-size: 0.95rem; }
        .meal-list li:last-child { margin-bottom: 0; }
        /* Gave min-width and flex-shrink to prevent breaking */
        .meal-time { font-weight: 600; min-width: 125px; flex-shrink: 0; color: #555; }
        .meal-food { color: var(--dark); font-weight: 500; flex: 1; line-height: 1.4; }

        /* === RIGHT COL: LIVE MENU STYLES === */
        .live-item { display: flex; gap: 15px; align-items: center; padding: 15px 0; border-bottom: 1px dashed var(--border); }
        .live-item:last-child { border-bottom: none; }
        .live-item img { width: 90px; height: 90px; border-radius: 15px; object-fit: cover; }
        .item-info { flex: 1; }
        .item-info h4 { font-size: 1.1rem; color: var(--dark); margin-bottom: 4px; }
        .item-info p { font-size: 0.85rem; color: #777; margin-bottom: 8px; line-height: 1.3; }
        .item-info .price { font-size: 1.1rem; font-weight: 700; color: var(--dark); }
        
        .add-btn { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 8px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; }
        .add-btn:hover { background: var(--primary); color: white; }

        /* Offline Message */
        .offline-msg { text-align: center; padding: 40px 20px; color: #888; }
        .offline-msg img { width: 100px; opacity: 0.5; margin-bottom: 15px; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .profile-header { justify-content: center; text-align: center; }
            .header-left { flex-direction: column; }
            .btn-wa { width: 100%; text-align: center; }
            .layout-grid { flex-direction: column; } 
            .col-left, .col-right { padding: 20px; }
        }
    </style>
</head>
